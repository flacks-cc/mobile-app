<ion-content [fullscreen]="true" class="ion-padding">

  <ion-img src="assets/img/logo_flacks2.png" class="logo-img ion-margin"></ion-img>

  <ion-text class="ion-text-center ion-margin-bottom">
    <h1><b>Flack's Cut & Connect</b></h1>
  </ion-text>

  <ion-text class="ion-text-center ion-margin-bottom">
    <p class="text">La aplicación móvil oficial de Flack's Barber Shop</p>
  </ion-text>

  <ion-item lines="none" class="ion-margin-bottom" style="--background: transparent;">
    <ion-button fill="clear" color="primary" routerLink="/tabs/home">¿Deseas continuar como invitado?</ion-button>
  </ion-item>

    <ion-item lines="none" class="ion-margin-bottom">
      <ion-input
        type="email"
        placeholder="Correo electrónico"
        name="email"
        required
        email
        errorText="Email invalido"
        ngModel
        #email="ngModel"
      ></ion-input>
      <ion-icon slot="start" name="person"></ion-icon>
    </ion-item>

    <ion-item lines="none" class="ion-margin-bottom">
      <ion-input
        type="password"
        placeholder="Contraseña"
        name="password"
        required
        minlength="8"
        errorText="Contraseña invalida"
        ngModel
        #password="ngModel"
    ></ion-input>
      <ion-icon slot="start" name="lock-closed"></ion-icon>
    </ion-item>

    <ion-item lines="none" class="ion-margin-bottom" style="--background: transparent;">
      <ion-checkbox slot="start"></ion-checkbox>
      <ion-label>Recuérdame</ion-label>
      <ion-button slot="end" fill="clear" color="primary">¿Olvidaste tu contraseña?</ion-button>
    </ion-item>

    <ion-button expand="block" class="ion-margin-bottom" color="primary" type="submit" routerLink="/tabs/home"
      >Iniciar sesión</ion-button>

  <ion-button expand="block" class="ion-margin-bottom" color="primary" routerLink="/tabs/home">
    <ion-icon slot="start" name="logo-google"></ion-icon>
    Iniciar sesión con Google
  </ion-button>

  <ion-item lines="none" class="ion-margin-bottom" style="--background: transparent;">
    <ion-label>¿No tienes una cuenta?</ion-label>
    <ion-button fill="clear" color="primary" routerLink="/sign-up">Regístrate</ion-button>
  </ion-item>

</ion-content>
