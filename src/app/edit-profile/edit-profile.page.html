<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/tabs/home">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-item lines="none" class="ion-margin-bottom" style="--background: transparent;">
    <ion-avatar slot="start" class="ion-align-self-center">
      <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>

    <ion-text class="ion-align-self-center">
      <p class="text">En esta sección, tendrás la oportunidad de configurar tu perfil.</p>
    </ion-text>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Nombre (s)"></ion-input>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Apellido paterno"></ion-input>
    <ion-input type="text" placeholder="Apellido materno"></ion-input>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Nombre de usuario"></ion-input>
    <ion-icon slot="start" name="person"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Correo electrónico"></ion-input>
    <ion-icon slot="start" name="mail"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Número de teléfono"></ion-input>
    <ion-icon slot="start" name="call"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="password" placeholder="Contraseña"></ion-input>
    <ion-icon slot="start" name="lock-closed"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="password" placeholder="Repetir contraseña"></ion-input>
    <ion-icon slot="start" name="lock-closed"></ion-icon>
  </ion-item>

  <ion-button expand="block" color="primary">Guardar cambios</ion-button>

</ion-content>
