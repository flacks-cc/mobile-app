<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/tabs/home">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-text class="ion-margin-bottom">
    <h1><b>¡Contáctanos!</b></h1>
  </ion-text>

  <ion-text class="ion-margin-bottom">
    <p class="text">En Flack's Barber Shop, nos importa conocer tu opinión.
      Por favor, comparte cualquier problema, duda o sugerencia que puedas tener con nosotros.</p>
  </ion-text>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Nombre (s)"></ion-input>
    <ion-icon slot="start" name="person"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Apellido paterno"></ion-input>
    <ion-input type="text" placeholder="Apellido materno"></ion-input>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Correo electrónico"></ion-input>
    <ion-icon slot="start" name="mail"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Número de teléfono"></ion-input>
    <ion-icon slot="start" name="call"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input type="text" placeholder="Ingresa tu mensaje"></ion-input>
    <ion-icon slot="start" name="chatbubble"></ion-icon>
  </ion-item>

  <ion-button expand="block" color="primary">Enviar mensaje</ion-button>

  <ion-item lines="none" style="--background: transparent;">
    <ion-label>¿Deseas hablar con nosotros?</ion-label>
    <ion-button fill="clear" color="primary" routerLink="/login">Llámanos</ion-button>
  </ion-item>

</ion-content>
