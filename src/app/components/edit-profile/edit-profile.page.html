<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/tabs/home">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-item lines="none" class="ion-margin-bottom" style="--background: transparent;">
    <ion-avatar slot="start" class="ion-align-self-center">
      <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>

    <ion-text class="ion-align-self-center">
      <p class="text">En esta secci처n, tendr찼s la oportunidad de configurar tu perfil.</p>
    </ion-text>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Nombre (s)"
      name="nombre"
      required
      minlength="4"
      pattern="[A-Za-z찼챕챠처첬횁횋횒횙횣챰횗\s]*"
      errorText="Agrega un nombre valido. Por ejemplo: Alan"
      ngModel
      #nombre="ngModel"
    ></ion-input>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Apellido paterno"
      name="apellidoP"
      required
      minlength="4"
      pattern="[A-Za-z찼챕챠처첬횁횋횒횙횣챰횗\s]*"
      errorText="Agrega un apellido valido. Por ejemplo: Lara"
      ngModel
      #apellidos="ngModel"
    ></ion-input>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Apellido materno"
      name="apellidoM"
      required
      minlength="2"
      pattern="[A-Za-z찼챕챠처첬횁횋횒횙횣챰횗\s]*"
      errorText="Agrega un apellido valido. Por ejemplo: Cruz"
      ngModel
      #apellidos="ngModel"
    ></ion-input>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Nombre de usuario"
      name="username"
      required
      minlength="4"
      errorText="Agrega un nombre de usuario valido. Por ejemplo: Juan"
      ngModel
      #username="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="person"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="email"
      placeholder="Correo electr처nico"
      name="email"
      required
      pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
      errorText="Por favor, introduce un correo electr처nico v찼lido. Por ejemplo: usuario@ejemplo.com"
      ngModel
      #email="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="mail"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="N첬mero de tel챕fono"
      type="tel"
      name="telefono"
      pattern="^[0-9]{10}$"
      maxlength="10"
      minlength="10"
      errorText="El n첬mero de tel챕fono debe contener 10 d챠gitos."
      ngModel
      #telefono="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="call"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="password"
      placeholder="Contrase챰a"
      name="password"
      required
      minlength="8"
      maxlength="16"
      errorText="La contrase챰a debe tener entre 8 y 16 caracteres."
      ngModel
      #password="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="lock-closed"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="password"
      placeholder="Repetir contrase챰a"
      name="confirmPassword"
      required
      minlength="8"
      maxlength="16"
      errorText="Contrase챰a invalida"
      ngModel
      #confirmPassword="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="lock-closed"></ion-icon>
  </ion-item>

  <ion-button expand="block" class="ion-margin-bottom" color="primary" (click)="checkPasswordsMatch()">Guardar cambios</ion-button>
  <ion-text *ngIf="showError" color="danger">
    Llena todos los campos primero o verifica que tus contrase챰as coincidan.
  </ion-text>
  
</ion-content>
