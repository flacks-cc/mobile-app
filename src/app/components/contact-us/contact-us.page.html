<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/tabs/home">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-text class="ion-margin-bottom">
    <h1><b>¡Contáctanos!</b></h1>
  </ion-text>

  <ion-text class="ion-margin-bottom">
    <p class="text">En Flack's Barber Shop, nos importa conocer tu opinión.
      Por favor, comparte cualquier problema, duda o sugerencia que puedas tener con nosotros.</p>
  </ion-text>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Nombre (s)"
      name="nombre"
      required
      minlength="4"
      pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]*"
      errorText="Agrega un nombre valido"
      ngModel
      #nombre="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="person"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Apellido paterno"
      name="apellidoP"
      required
      minlength="8"
      pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]*"
      errorText="Agrega un apellido valido"
      ngModel
      #apellidos="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="people"></ion-icon>
  </ion-item>

  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Apellido materno"
      name="apellidoM"
      required
      minlength="8"
      pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]*"
      errorText="Agrega un apellido valido"
      ngModel
      #apellidos="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="people"></ion-icon>
  </ion-item>
  
  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Correo electrónico"
      name="email"
      required
      pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
      errorText="Por favor, introduce un correo electrónico válido"
      ngModel
      #email="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="mail"></ion-icon>
  </ion-item>
  
  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Número de teléfono"
      type="tel"
      name="telefono"
      pattern="^[0-9]{10}$"
      maxlength="10"
      minlength="10"
      errorText="El número de teléfono debe contener 10 dígitos."
      ngModel
      #telefono="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="call"></ion-icon>
  </ion-item>
  
  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input
      type="text"
      placeholder="Ingresa tu mensaje"
      name="mensaje"
      required
      minlength="10"
      errorText="El mensaje debe tener al menos 10 caracteres."
      ngModel
      #mensaje="ngModel"
    ></ion-input>
    <ion-icon slot="start" name="chatbubble"></ion-icon>
  </ion-item>
  
  <ion-button expand="block" color="primary" (click)="checkFieldsFilled()">Enviar mensaje</ion-button>
  <ion-item *ngIf="showError" class="ion-margin-bottom" style="--background: transparent;">
    <ion-text color="danger">
      <p>Llena todos los campos primero</p>
    </ion-text>
  </ion-item>

  <ion-item lines="none" style="--background: transparent;">
    <ion-label>¿Ya tienes una cuenta?</ion-label>
    <ion-button fill="clear" color="primary" routerLink="/login">Inicia sesión</ion-button>
  </ion-item>

</ion-content>
